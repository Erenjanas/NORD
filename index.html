<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* ========================================
           SNOW EFFECT - KAR YAGMA EFEKTI
        ======================================== */
        .snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .snowflake {
            position: absolute;
            top: -10px;
            color: #fff;
            opacity: 0.8;
            animation: fall linear infinite;
            text-shadow: 0 0 8px rgba(255,255,255,0.8), 0 0 15px rgba(255,255,255,0.4);
        }

        @keyframes fall {
            0% {
                transform: translateY(-10px) rotate(0deg) translateX(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(100vh) rotate(720deg) translateX(50px);
                opacity: 0;
            }
        }

        /* ========================================
           MOUSE GLOW
        ======================================== */
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            background: radial-gradient(circle, rgba(0,100,255,0.1) 0%, rgba(0,100,255,0.03) 40%, transparent 70%);
            transform: translate(-50%, -50%);
            transition: all 0.15s ease;
            mix-blend-mode: screen;
        }

        /* ========================================
           MAIN CONTAINER
        ======================================== */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px 30px;
            position: relative;
            z-index: 10;
            gap: 30px;
        }

        /* ========================================
           NORD TITLE
        ======================================== */
        .nord-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 900;
            letter-spacing: 15px;
            color: #fff;
            text-transform: uppercase;
            text-align: center;
            animation: titleReveal 2s ease-out forwards;
            opacity: 0;
            line-height: 1.2;
            text-shadow: 0 0 20px rgba(0,100,255,0.6), 0 0 40px rgba(0,100,255,0.3);
        }

        @keyframes titleReveal {
            0% {
                opacity: 0;
                transform: translateY(-30px);
                filter: blur(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* ========================================
           PROFILE SECTION
        ======================================== */
        .profile-section {
            position: relative;
            width: 220px;
            height: 220px;
            animation: profileReveal 1.5s ease-out 0.5s forwards;
            opacity: 0;
            transform: scale(0.8);
        }

        @keyframes profileReveal {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .profile-img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(0,100,255,0.5);
            box-shadow: 0 0 30px rgba(0,100,255,0.3), 0 0 60px rgba(0,100,255,0.15);
            animation: imgFloat 5s ease-in-out infinite;
            transition: all 0.4s ease;
            position: relative;
            z-index: 2;
        }

        .profile-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0,100,255,0.5), 0 0 100px rgba(0,100,255,0.3);
        }

        @keyframes imgFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .profile-ring {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: rgba(0,100,255,0.6);
            border-right-color: rgba(0,100,255,0.2);
            animation: spin 8s linear infinite;
            z-index: 1;
        }

        .profile-ring:nth-child(2) {
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border-top-color: rgba(0,200,255,0.3);
            border-left-color: rgba(0,100,255,0.6);
            animation: spin 12s linear infinite reverse;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========================================
           MESSAGE BOX
        ======================================== */
        .message-box {
            max-width: 500px;
            text-align: center;
            padding: 20px 30px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(0,100,255,0.2);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            animation: messageReveal 1.5s ease-out 1s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes messageReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #d0d0d0;
            position: relative;
            z-index: 1;
        }

        .message-text span {
            color: #4488ff;
            font-weight: 700;
        }

        /* ========================================
           BUTTONS
        ======================================== */
        .buttons-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            animation: buttonsReveal 1.5s ease-out 1.5s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes buttonsReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            color: #fff;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 50px;
            border: none;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.03);
        }

        .btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        .telegram-btn {
            background: linear-gradient(135deg, #0088cc, #00a8e8);
            box-shadow: 0 4px 20px rgba(0,136,204,0.3);
        }

        .telegram-btn:hover {
            box-shadow: 0 8px 35px rgba(0,136,204,0.5);
        }

        .whatsapp-btn {
            background: linear-gradient(135deg, #25d366, #128c7e);
            box-shadow: 0 4px 20px rgba(37,211,102,0.3);
        }

        .whatsapp-btn:hover {
            box-shadow: 0 8px 35px rgba(37,211,102,0.5);
        }

        .btn-icon {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        /* ========================================
           MUSIC PLAYER - ALBUM KAPAGI YOK
        ======================================== */
        .music-section {
            width: 100%;
            max-width: 400px;
            animation: musicReveal 1.5s ease-out 2s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes musicReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .music-player {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(0,100,255,0.15);
            border-radius: 20px;
            padding: 20px 25px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .music-player:hover {
            border-color: rgba(0,100,255,0.3);
        }

        /* SARKI BILGISI */
        .music-info {
            text-align: center;
            margin-bottom: 18px;
        }

        .music-info h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .music-info p {
            font-size: 0.8rem;
            color: #888;
        }

        /* SES DALGASI - BUYUK */
        .wave-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 50px;
            margin-bottom: 15px;
        }

        .wave-bar {
            width: 6px;
            background: linear-gradient(to top, #0064ff, #00a8e8, #4488ff);
            border-radius: 3px;
            animation: wave 0.8s ease-in-out infinite;
            box-shadow: 0 0 8px rgba(0,100,255,0.4);
        }

        .wave-bar:nth-child(1) { height: 12px; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 28px; animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { height: 18px; animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { height: 38px; animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { height: 22px; animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { height: 32px; animation-delay: 0.5s; }
        .wave-bar:nth-child(7) { height: 15px; animation-delay: 0.6s; }
        .wave-bar:nth-child(8) { height: 35px; animation-delay: 0.7s; }
        .wave-bar:nth-child(9) { height: 20px; animation-delay: 0.8s; }
        .wave-bar:nth-child(10) { height: 30px; animation-delay: 0.9s; }
        .wave-bar:nth-child(11) { height: 14px; animation-delay: 1.0s; }
        .wave-bar:nth-child(12) { height: 26px; animation-delay: 1.1s; }
        .wave-bar:nth-child(13) { height: 18px; animation-delay: 1.2s; }
        .wave-bar:nth-child(14) { height: 34px; animation-delay: 1.3s; }
        .wave-bar:nth-child(15) { height: 16px; animation-delay: 1.4s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        .wave-container.paused .wave-bar {
            animation-play-state: paused;
            height: 8px !important;
            opacity: 0.3;
            box-shadow: none;
            transition: all 0.5s ease;
        }

        /* KONTROLLER */
        .music-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .play-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0064ff, #00a8e8);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0,100,255,0.4);
            cursor: pointer;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0,100,255,0.6);
        }

        .play-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .play-btn .play-icon { margin-left: 2px; }
        .play-btn .pause-icon { display: none; }

        .music-player.playing .play-btn {
            animation: playPulse 2s ease-in-out infinite;
        }

        @keyframes playPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0,100,255,0.4); }
            50% { box-shadow: 0 0 30px rgba(0,100,255,0.7); }
        }

        /* PROGRESS */
        .progress-area {
            margin-bottom: 12px;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #555;
            margin-bottom: 6px;
            font-family: 'Orbitron', sans-serif;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0064ff, #00a8e8);
            border-radius: 2px;
            transition: width 0.1s linear;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,100,255,0.8);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .music-player:hover .progress-bar::after {
            opacity: 1;
        }

        /* VOLUME */
        .volume-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-icon {
            width: 16px;
            height: 16px;
            fill: #555;
        }

        .volume-slider {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #0064ff;
            box-shadow: 0 0 8px rgba(0,100,255,0.6);
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #0064ff;
            box-shadow: 0 0 8px rgba(0,100,255,0.6);
            border: none;
            cursor: pointer;
        }

        /* ========================================
           FOOTER
        ======================================== */
        .footer {
            font-size: 0.75rem;
            color: #333;
            letter-spacing: 3px;
            animation: footerReveal 2s ease-out 2.5s forwards;
            opacity: 0;
        }

        @keyframes footerReveal {
            to { opacity: 1; }
        }

        /* ========================================
           RIPPLE EFFECT
        ======================================== */
        @keyframes rippleEffect {
            to {
                width: 200px;
                height: 200px;
                opacity: 0;
            }
        }

        /* ========================================
           RESPONSIVE
        ======================================== */
        @media (max-width: 600px) {
            .main-container {
                padding: 30px 15px 20px;
                gap: 20px;
            }
            .nord-title {
                font-size: clamp(2.5rem, 10vw, 4rem);
                letter-spacing: 8px;
            }
            .profile-section,
            .profile-img {
                width: 180px;
                height: 180px;
            }
            .message-text {
                font-size: 1rem;
            }
            .btn {
                padding: 12px 30px;
                font-size: 0.85rem;
            }
            .buttons-container {
                flex-direction: column;
                align-items: center;
            }
            .music-section {
                max-width: 100%;
            }
            .wave-container {
                height: 40px;
            }
            .wave-bar {
                width: 4px;
            }
        }
    </style>
</head>

    <script>
        // ===== MOUSE GLOW =====
        const cursorGlow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });

        // ===== SNOW - KAR YAGMA EFEKTI =====
        const snowContainer = document.getElementById('snowContainer');
        const snowflakeCount = 80;

        for (let i = 0; i < snowflakeCount; i++) {
            const snowflake = document.createElement('div');
            snowflake.className = 'snowflake';
            snowflake.innerHTML = ['❄','❅','❆','•','·'][Math.floor(Math.random() * 5)];
            snowflake.style.left = Math.random() * 100 + '%';
            snowflake.style.animationDuration = (Math.random() * 6 + 4) + 's';
            snowflake.style.animationDelay = (Math.random() * 8) + 's';
            snowflake.style.fontSize = (Math.random() * 12 + 8) + 'px';
            snowflake.style.opacity = (Math.random() * 0.7 + 0.3);
            snowContainer.appendChild(snowflake);
        }

        // ===== RIPPLE CLICK =====
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.style.cssText = 'position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;width:0;height:0;border-radius:50%;background:rgba(0,100,255,0.2);transform:translate(-50%,-50%);pointer-events:none;z-index:9999;animation:rippleEffect 0.5s ease-out forwards';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
        });

        // ===== MUSIC PLAYER - INFINITYFREE UYUMLU =====
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const waveContainer = document.getElementById('waveContainer');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeSlider = document.getElementById('volumeSlider');
        const musicPlayer = document.getElementById('musicPlayer');

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + secs.toString().padStart(2, '0');
        }

        // InfinityFree icin audio yukleme kontrolu
        audioPlayer.addEventListener('loadedmetadata', () => {
            console.log('Audio yuklendi, sure:', audioPlayer.duration);
            totalTimeEl.textContent = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('error', (e) => {
            console.log('Audio hatasi:', e);
            console.log('Audio error code:', audioPlayer.error ? audioPlayer.error.code : 'bilinmiyor');
        });

        audioPlayer.addEventListener('canplay', () => {
            console.log('Audio oynatilmaya hazir');
        });

        playBtn.addEventListener('click', () => {
            if (audioPlayer.paused) {
                const playPromise = audioPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        console.log('Audio caliyor');
                        playIcon.style.display = 'none';
                        pauseIcon.style.display = 'block';
                        waveContainer.classList.remove('paused');
                        musicPlayer.classList.add('playing');
                    }).catch(error => {
                        console.log('Oynatma hatasi:', error);
                        alert('Muzik dosyasi yuklenemedi. Lutfen music.mp3 dosyasinin dogru yerde oldugunu kontrol edin.');
                    });
                }
            } else {
                audioPlayer.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                waveContainer.classList.add('paused');
                musicPlayer.classList.remove('playing');
            }
        });

        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.duration && isFinite(audioPlayer.duration)) {
                const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.style.width = progress + '%';
                currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
            }
        });

        audioPlayer.addEventListener('ended', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            waveContainer.classList.add('paused');
            musicPlayer.classList.remove('playing');
            progressBar.style.width = '0%';
            currentTimeEl.textContent = '0:00';
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percentage = x / rect.width;
            if (audioPlayer.duration && isFinite(audioPlayer.duration)) {
                audioPlayer.currentTime = percentage * audioPlayer.duration;
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audioPlayer.volume = e.target.value / 100;
        });

        audioPlayer.volume = 0.7;

        // Sayfa yuklendiginde audio durumunu kontrol et
        window.addEventListener('load', () => {
            console.log('Sayfa yuklendi');
            console.log('Audio readyState:', audioPlayer.readyState);
            console.log('Audio src:', audioPlayer.currentSrc);
        });
    </script>
</body>
</html>
